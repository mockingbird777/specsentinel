<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">SpecSentinel</title>
  <desc id="desc">Security-aware OpenAPI contract intelligence</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d1d"/><stop offset="0.5" stop-color="#141436"/><stop offset="1" stop-color="#081426"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a78bfa"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow"><stop stop-color="#7c3aed" stop-opacity=".52"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feGaussianBlur stdDeviation="16"/></filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#94a3b8" stroke-opacity=".08"/></pattern>
  </defs>
  <rect width="1280" height="460" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="460" rx="28" fill="url(#grid)"/>
  <circle cx="250" cy="170" r="260" fill="url(#glow)" filter="url(#shadow)"/>
  <g transform="translate(105 88)">
    <path d="M132 4 244 46v84c0 76-44 126-112 156C64 256 20 206 20 130V46Z" fill="#111a33" stroke="url(#shield)" stroke-width="7"/>
    <path d="m79 143 34 34 77-83" fill="none" stroke="url(#shield)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="218" cy="66" r="8" fill="#22d3ee"/><circle cx="49" cy="83" r="6" fill="#a78bfa"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="405" y="175" fill="#f8fafc" font-size="73" font-weight="800" letter-spacing="-3">SpecSentinel</text>
    <text x="410" y="224" fill="#c4b5fd" font-size="23" font-weight="700" letter-spacing="2.8">OPENAPI CONTRACT INTELLIGENCE</text>
    <text x="410" y="283" fill="#a8b4cc" font-size="24">Catch breaking changes and security surprises</text>
    <text x="410" y="319" fill="#a8b4cc" font-size="24">before your clients do.</text>
    <g transform="translate(410 350)">
      <rect width="126" height="42" rx="21" fill="#8b5cf6" fill-opacity=".18" stroke="#a78bfa" stroke-opacity=".5"/><text x="63" y="27" fill="#ddd6fe" font-size="14" text-anchor="middle" font-weight="700">OPENAPI 3.x</text>
      <rect x="140" width="98" height="42" rx="21" fill="#0891b2" fill-opacity=".18" stroke="#22d3ee" stroke-opacity=".5"/><text x="189" y="27" fill="#a5f3fc" font-size="14" text-anchor="middle" font-weight="700">SARIF</text>
      <rect x="252" width="132" height="42" rx="21" fill="#334155" fill-opacity=".45" stroke="#64748b" stroke-opacity=".6"/><text x="318" y="27" fill="#dbeafe" font-size="14" text-anchor="middle" font-weight="700">ZERO CONFIG</text>
    </g>
  </g>
</svg>
