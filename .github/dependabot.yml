version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # esbuild 0.x minor releases may raise the supported Node.js floor.
      - dependency-name: esbuild
        update-types:
          - version-update:semver-minor
