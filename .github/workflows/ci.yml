name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Verify bundled Action is current
        if: matrix.node == 20
        run: git diff --exit-code -- dist/action.cjs
      - name: Verify package contents
        if: matrix.node == 20
        run: npm pack --dry-run
      - name: Smoke-test the bundled GitHub Action
        if: matrix.node == 20
        env:
          INPUT_BASELINE: fixtures/baseline.yaml
          INPUT_CANDIDATE: fixtures/candidate.yaml
          INPUT_FAIL-ON: critical
          INPUT_FORMAT: json
        run: node dist/action.cjs || test $? -eq 1
